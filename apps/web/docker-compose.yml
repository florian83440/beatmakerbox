# Beatmakerbox — static SPA served by nginx, fronted by Traefik.
# Container naming convention required by vps-ops: <slug>-<role>-<index>
# → here "beatmakerbox-web-1" (the "-1" is appended by docker compose).
#
# Set BEATMAKERBOX_DOMAIN in .env (e.g. BEATMAKERBOX_DOMAIN=beatmakerbox.com)
# before the first `docker compose up -d`.

services:
  web:
    build:
      # Build context = monorepo root, because the web app pulls in the
      # @beatmakerbox/dsp workspace package.
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: beatmakerbox:latest
    container_name: beatmakerbox-web-1
    restart: unless-stopped
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # HTTPS router. HTTP → HTTPS redirect is handled globally by the
      # Traefik `web` entrypoint (--entrypoints.web.http.redirections...),
      # so no per-container redirect router is needed.
      - "traefik.http.routers.beatmakerbox.rule=Host(`${BEATMAKERBOX_DOMAIN}`)"
      - "traefik.http.routers.beatmakerbox.entrypoints=websecure"
      - "traefik.http.routers.beatmakerbox.tls=true"
      - "traefik.http.routers.beatmakerbox.tls.certresolver=le"
      - "traefik.http.services.beatmakerbox.loadbalancer.server.port=80"

networks:
  traefik_proxy:
    external: true
