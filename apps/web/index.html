<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141414" />

    <!-- Title + description per route are injected by useHead() at SSG time;
         the values below are the fallback shown if the head plugin somehow
         fails to mount. -->
    <title>Beatmakerbox</title>
    <meta name="description" content="Free in-browser audio tools for beatmakers." />

    <!-- General Sans is self-hosted (see public/fonts) — no external font
         request, in line with the app's no-tracker promise. Preload the
         two weights used above the fold: 500 for body, 600 for headings. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/general-sans-500.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/general-sans-600.woff2" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
