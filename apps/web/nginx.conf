server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  # Long-cache for hashed assets (Vite emits content-hashed filenames in /assets/)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Short-cache for the entry HTML so deploys are picked up quickly
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # vite-ssg emits one .html per route at the dist root (e.g. /key-finder.html).
  # The extra "$uri.html" probe lets clean URLs like /key-finder serve the
  # pre-rendered file so crawlers see the real content. Falls back to
  # /index.html for genuinely unknown paths so Vue Router can take over.
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # Trim noise from logs
  location = /favicon.ico { log_not_found off; access_log off; }
  location = /robots.txt  { log_not_found off; access_log off; }
}
